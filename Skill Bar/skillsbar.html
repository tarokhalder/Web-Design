<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="uf8">
    <meta http-equiv="X-UA-Compitable" content="IE=edge">
    <meta name="viewport" content="width = device-width" , intial scale = 1.0"> 
    <link rel="stylesheet" href="style.css">
    <title>Animated Skills Bar</title>
</head>
<body>
    <div class="container">
        <div class="skill-box">
            <span class="title">Python</span>
            <div class="skill-bar">
                <span class="skill-per python">
                   <span class="tooltip">90%</span>
                </span>
            </div>
        </div>

        <div class="skill-box">
            <span class="title">C++</span>
            <div class="skill-bar">
                <span class="skill-per cplusplus">
                   <span class="tooltip">91%</span>
                </span>
            </div>
        </div>

        <div class="skill-box">
            <span class="title">Kotlin</span>
            <div class="skill-bar">
                <span class="skill-per kotlin">
                   <span class="tooltip">60%</span>
                </span>
            </div>
        </div>

        <div class="skill-box">
            <span class="title">Java</span>
            <div class="skill-bar">
                <span class="skill-per java">
                   <span class="tooltip">90%</span>
                </span>
            </div>
        </div>
    </div>
</body>
</html>
